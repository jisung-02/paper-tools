name: Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  TINYGO_VERSION: 0.41.1
  TINYGO_AMD64_SHA256: 901fbccffc61adb111656d1f907dfc21b6c499ca841b115866a0d6de2d835fbe

jobs:
  deploy:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install TinyGo
        if: github.event_name == 'workflow_dispatch'
        run: |
          curl -fsSL -o /tmp/tinygo.deb https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb
          echo "${TINYGO_AMD64_SHA256}  /tmp/tinygo.deb" | sha256sum -c -
          sudo dpkg -i /tmp/tinygo.deb

      - name: Install binaryen (wasm-opt)
        if: github.event_name == 'workflow_dispatch'
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache Go/TinyGo build cache
        if: github.event_name == 'workflow_dispatch'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/tinygo
          key: tinygo-build-${{ env.TINYGO_VERSION }}-${{ hashFiles('go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            tinygo-build-${{ env.TINYGO_VERSION }}-${{ hashFiles('go.sum') }}-
            tinygo-build-${{ env.TINYGO_VERSION }}-

      - name: Test
        run: |
          go test ./...
          node tools/verify-vendor.mjs

      - name: Test (TinyGo runtime)
        if: github.event_name == 'workflow_dispatch'
        run: tinygo test ./pdf ./xlsx ./imgconv

      - name: Download deployment WebAssembly from CI
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: deployment-wasm
          path: web
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Build WebAssembly tools for manual deployment
        if: github.event_name == 'workflow_dispatch'
        run: ./build.sh

      - name: Generate localized pages
        run: |
          cp tools/operation-catalog.json web/operation-catalog.json
          node tools/gen-i18n.mjs

      - name: Test generated web assets
        run: node --test

      - name: Check WebAssembly size budget
        run: node tools/check-wasm-size.mjs web

      - name: Stage static assets without duplication
        run: node tools/stage-assets.mjs --hash web .staging/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .staging/web --project-name=paper-tools --branch=main --commit-dirty=true
