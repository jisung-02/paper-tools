name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TINYGO_VERSION: 0.41.1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install TinyGo
        run: |
          curl -fsSL -o /tmp/tinygo.deb https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb
          sudo dpkg -i /tmp/tinygo.deb

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Cache Go/TinyGo build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/tinygo
          key: tinygo-build-${{ env.TINYGO_VERSION }}-${{ hashFiles('go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            tinygo-build-${{ env.TINYGO_VERSION }}-${{ hashFiles('go.sum') }}-
            tinygo-build-${{ env.TINYGO_VERSION }}-

      - name: Test
        run: go test ./...

      - name: Test (TinyGo runtime)
        run: tinygo test ./pdf ./xlsx ./imgconv

      - name: Cache built wasm artifacts
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            web/*/*.wasm
            web/wasm_exec.js
          key: wasm-tinygo${{ env.TINYGO_VERSION }}-${{ hashFiles('go.mod', 'go.sum', 'build.sh', '**/*.go') }}

      - name: Build WebAssembly tools
        if: ${{ steps.wasm-cache.outputs.cache-hit != 'true' }}
        run: ./build.sh

      - name: Generate localized pages
        if: ${{ steps.wasm-cache.outputs.cache-hit == 'true' }}
        run: node tools/gen-i18n.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name=paper-tools --branch=main --commit-dirty=true
