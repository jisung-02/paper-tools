<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Image Convert" data-ko="이미지 포맷 변환">Image Convert</h1>
<p class="desc" data-i18n data-en="Convert between PNG, JPG and GIF." data-ko="PNG·JPG·GIF 이미지를 다른 포맷으로 변환합니다.">Convert between PNG, JPG and GIF.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drag an image here, or click to choose" data-ko="이미지를 끌어다 놓거나 클릭해서 선택">Drag an image here, or click to choose</span>
  <input type="file" accept="image/png,image/jpeg,image/gif">
  <ul class="filelist"></ul>
</div>

<label for="fmt" data-i18n data-en="Format" data-ko="포맷">Format</label>
<select id="fmt">
  <option value="png">PNG</option>
  <option value="jpeg" selected>JPG</option>
  <option value="gif">GIF</option>
</select>

<label for="quality" data-i18n data-en="JPG quality" data-ko="JPG 품질">JPG quality</label>
<input type="number" id="quality" min="1" max="100" value="85">

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Convert" data-ko="변환하기">Convert</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./imgconv.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const fmt = document.getElementById("fmt");
const quality = document.getElementById("quality");

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select an image.", "이미지를 선택하세요."));
    return;
  }
  const bytes = await fileBytes(fileDz.files[0]);
  const r = pdfRun(bytes, fmt.value, parseInt(quality.value, 10) || 85);

  let ext, mime;
  switch (fmt.value) {
    case "png":
      ext = "png";
      mime = "image/png";
      break;
    case "jpeg":
      ext = "jpg";
      mime = "image/jpeg";
      break;
    case "gif":
      ext = "gif";
      mime = "image/gif";
      break;
    default:
      ext = "converted";
      mime = "application/octet-stream";
  }

  finish(r, "converted." + ext, err, mime);
}));
</script>
</body>
</html>
