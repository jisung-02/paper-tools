<header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Hangul → PDF" data-ko="한글(.hwpx) → PDF">Hangul → PDF</h1>
<p class="desc" data-i18n data-en="Convert .hwpx text into a PDF (text-focused). Layout, tables and images are not preserved." data-ko="한글 hwpx 문서의 글을 PDF로 변환합니다. (서식·표 배치는 유지되지 않는 텍스트 위주 변환)">Convert .hwpx text into a PDF (text-focused). Layout, tables and images are not preserved.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drop a Hangul (.hwpx) file here, or click to choose" data-ko="한글 파일(.hwpx)을 끌어다 놓거나 클릭해서 선택">Drop a Hangul (.hwpx) file here, or click to choose</span>
  <input type="file" accept=".hwpx">
  <ul class="filelist"></ul>
</div>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Create PDF" data-ko="PDF 만들기">Create PDF</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
let fontBytes = null;
let wasmReady = false, fontOk = false;
const btn = document.getElementById("run");
const err = document.getElementById("err");

function maybeEnable() { btn.disabled = !(wasmReady && fontOk); }
btn.disabled = true;

const fontReady = fetch("../NanumGothic-Regular.ttf")
  .then(r => r.arrayBuffer())
  .then(buf => { fontBytes = new Uint8Array(buf); fontOk = true; maybeEnable(); })
  .catch(e => { showErr(err, t("Failed to load font: ", "폰트를 불러오지 못했습니다: ") + e); throw e; });

boot("./hwpx2pdf.wasm").then(() => { wasmReady = true; maybeEnable(); }).catch(() => {});

const fileDz = dropzone("fileDrop", { multiple: false });

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) { showErr(err, t("Select a file.", "파일을 선택하세요.")); return; }
  const fileBuf = await fileBytes(fileDz.files[0]);
  const r = pdfRun(fileBuf, fontBytes);
  finish(r, "converted.pdf", err);
}));
</script>
