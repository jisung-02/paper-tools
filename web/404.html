<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Page not found — Paper Tools</title>
<meta name="robots" content="noindex">
<style>
:root {
  --bg: #ffffff;
  --fg: #18181b;
  --muted: #71717a;
  --border: #e4e4e7;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; }
body {
  color: var(--fg);
  background: var(--bg);
  line-height: 1.6;
  font-size: 16px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; }
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 960px;
  margin: 0 auto;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.wordmark {
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--fg);
  text-decoration: none;
}
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 4rem 1.25rem;
  text-align: center;
}
h1 {
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0 0 .75rem;
}
p {
  color: var(--muted);
  margin: 0 0 1.5rem;
}
.back {
  color: var(--fg);
  font-weight: 500;
  text-decoration: none;
}
.back:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a class="wordmark" href="/">Paper Tools</a>
</header>

<main>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist.</p>
  <a class="back" href="/">← All tools</a>
</main>

</body>
</html>
