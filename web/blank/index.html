<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Insert Blank Page" data-ko="빈 페이지">Insert Blank Page</h1>
<p class="desc" data-i18n data-en="Add a blank page anywhere." data-ko="원하는 위치에 백지를 끼워 넣습니다.">Add a blank page anywhere.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<label for="after" data-i18n data-en="After page (0 = at the very front)" data-ko="몇 페이지 뒤에 (0 = 맨 앞)">After page (0 = at the very front)</label>
<input type="number" id="after" min="0" value="0">

<label for="count" data-i18n data-en="Number of pages" data-ko="몇 장">Number of pages</label>
<input type="number" id="count" min="1" max="100" value="1">

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Insert" data-ko="삽입하기">Insert</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./blank.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const after = document.getElementById("after");
const count = document.getElementById("count");

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select a file.", "파일을 선택하세요."));
    return;
  }
  const file = await fileBytes(fileDz.files[0]);
  const r = pdfRun(file, parseInt(after.value, 10) || 0, parseInt(count.value, 10) || 1);
  finish(r, "blank-added.pdf", err);
}));
</script>
