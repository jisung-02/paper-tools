<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Resize" data-ko="크기 통일">Resize</h1>
<p class="desc" data-i18n data-en="Make every page the same size (A4)." data-ko="모든 페이지를 같은 용지 크기로 맞춥니다.">Make every page the same size (A4).</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<label for="size" data-i18n data-en="Size" data-ko="크기">Size</label>
<select id="size">
  <option value="595.28,841.89" data-i18n data-en="A4 portrait (595.28×841.89pt)" data-ko="A4 세로 (595.28×841.89pt)">A4 portrait (595.28×841.89pt)</option>
  <option value="841.89,595.28" data-i18n data-en="A4 landscape (841.89×595.28pt)" data-ko="A4 가로 (841.89×595.28pt)">A4 landscape (841.89×595.28pt)</option>
  <option value="612,792">Letter (612×792pt)</option>
  <option value="419.53,595.28">A5 (419.53×595.28pt)</option>
</select>

<label for="ranges" data-i18n data-en="Pages (leave blank for all)" data-ko="페이지 (비우면 전체)">Pages (leave blank for all)</label>
<input type="text" id="ranges" placeholder="1-3,7">
<p class="hint" data-i18n data-en="Links and annotations will be removed" data-ko="링크·주석은 제거됩니다">Links and annotations will be removed</p>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Resize" data-ko="크기 바꾸기">Resize</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./resize.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const size = document.getElementById("size");
const ranges = document.getElementById("ranges");

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select a file.", "파일을 선택하세요."));
    return;
  }
  const file = await fileBytes(fileDz.files[0]);
  const [w, h] = size.value.split(",").map(Number);
  const r = pdfRun(file, ranges.value.trim(), w, h);
  finish(r, "resized.pdf", err);
}));
</script>
