<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crop — Paper Tools</title>
<link rel="stylesheet" href="../style.css">
<link rel="preload" href="./crop.wasm" as="fetch" crossorigin>
</head>
<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Crop" data-ko="자르기">Crop</h1>
<p class="desc" data-i18n data-en="Trim the margins." data-ko="페이지 가장자리의 여백을 잘라냅니다.">Trim the margins.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<label for="left" data-i18n data-en="Left (mm)" data-ko="왼쪽 (mm)">Left (mm)</label>
<input type="number" id="left" step="1" min="0" value="10">

<label for="bottom" data-i18n data-en="Bottom (mm)" data-ko="아래 (mm)">Bottom (mm)</label>
<input type="number" id="bottom" step="1" min="0" value="10">

<label for="right" data-i18n data-en="Right (mm)" data-ko="오른쪽 (mm)">Right (mm)</label>
<input type="number" id="right" step="1" min="0" value="10">

<label for="top" data-i18n data-en="Top (mm)" data-ko="위 (mm)">Top (mm)</label>
<input type="number" id="top" step="1" min="0" value="10">
<p class="hint" data-i18n data-en="Margin to trim from each side (mm)" data-ko="각 면에서 잘라낼 여백 (mm)">Margin to trim from each side (mm)</p>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Crop" data-ko="자르기">Crop</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./crop.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const left = document.getElementById("left");
const bottom = document.getElementById("bottom");
const right = document.getElementById("right");
const top = document.getElementById("top");

const MM_TO_PT = 72 / 25.4;

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select a file.", "파일을 선택하세요."));
    return;
  }
  const file = await fileBytes(fileDz.files[0]);
  const l = (parseFloat(left.value) || 0) * MM_TO_PT;
  const b = (parseFloat(bottom.value) || 0) * MM_TO_PT;
  const rr = (parseFloat(right.value) || 0) * MM_TO_PT;
  const tt = (parseFloat(top.value) || 0) * MM_TO_PT;
  const r = pdfRun(file, "", l, b, rr, tt);
  finish(r, "cropped.pdf", err);
}));
</script>
</body>
</html>
