<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Metadata — Paper Tools</title>
<link rel="stylesheet" href="../style.css">
<link rel="preload" href="./metadata.wasm" as="fetch" crossorigin>
</head>
<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Metadata" data-ko="메타데이터">Metadata</h1>
<p class="desc" data-i18n data-en="Edit or remove title, author and more." data-ko="제목·작성자 등 문서 정보를 수정하거나 모두 제거합니다.">Edit or remove title, author and more.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<label for="title" data-i18n data-en="Title" data-ko="제목">Title</label>
<input type="text" id="title" data-en-placeholder="Leave blank to keep existing value" data-ko-placeholder="비우면 기존 값 유지" placeholder="Leave blank to keep existing value">

<label for="author" data-i18n data-en="Author" data-ko="작성자">Author</label>
<input type="text" id="author" data-en-placeholder="Leave blank to keep existing value" data-ko-placeholder="비우면 기존 값 유지" placeholder="Leave blank to keep existing value">

<label for="subject" data-i18n data-en="Subject" data-ko="주제">Subject</label>
<input type="text" id="subject" data-en-placeholder="Leave blank to keep existing value" data-ko-placeholder="비우면 기존 값 유지" placeholder="Leave blank to keep existing value">

<label for="keywords" data-i18n data-en="Keywords" data-ko="키워드">Keywords</label>
<input type="text" id="keywords" data-en-placeholder="Leave blank to keep existing value" data-ko-placeholder="비우면 기존 값 유지" placeholder="Leave blank to keep existing value">

<div class="checkline">
  <input type="checkbox" id="strip">
  <label for="strip" data-i18n data-en="Remove all metadata (ignores the fields above)" data-ko="모든 메타데이터 제거 (위 입력 무시)">Remove all metadata (ignores the fields above)</label>
</div>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Save" data-ko="저장하기">Save</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./metadata.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const title = document.getElementById("title");
const author = document.getElementById("author");
const subject = document.getElementById("subject");
const keywords = document.getElementById("keywords");
const strip = document.getElementById("strip");

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select a file.", "파일을 선택하세요."));
    return;
  }
  const file = await fileBytes(fileDz.files[0]);
  const r = pdfRun(file, title.value, author.value, subject.value, keywords.value, strip.checked);
  finish(r, "metadata.pdf", err);
}));
</script>
</body>
</html>
