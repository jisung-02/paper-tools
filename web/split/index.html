<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Split & Extract" data-ko="분할·추출">Split & Extract</h1>
<p class="desc" data-i18n data-en="Pull out just the pages you need." data-ko="원하는 페이지만 새 PDF로 꺼냅니다.">Pull out just the pages you need.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<label for="ranges" data-i18n data-en="Pages (e.g. 1-3,7)" data-ko="페이지 (예: 1-3,7)">Pages (e.g. 1-3,7)</label>
<input type="text" id="ranges" placeholder="1-3,7">
<p class="hint" data-i18n data-en="e.g. 1-3,7 · for an open-ended range from the end, leave the end blank like 5-" data-ko="예: 1-3,7 · 뒤에서부터는 5- 처럼 끝을 비워두세요">e.g. 1-3,7 · for an open-ended range from the end, leave the end blank like 5-</p>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Extract" data-ko="추출하기">Extract</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./split.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const ranges = document.getElementById("ranges");

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select a file.", "파일을 선택하세요."));
    return;
  }
  if (!ranges.value.trim()) {
    showErr(err, t("Enter a page range.", "페이지 범위를 입력하세요."));
    return;
  }
  const file = await fileBytes(fileDz.files[0]);
  const r = pdfRun(file, ranges.value.trim());
  finish(r, "pages.pdf", err);
}));
</script>
</body>
</html>
