<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interleave — Paper Tools</title>
<link rel="stylesheet" href="../style.css">
<link rel="preload" href="./interleave.wasm" as="fetch" crossorigin>
</head>
<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Interleave" data-ko="교차 병합">Interleave</h1>
<p class="desc" data-i18n data-en="Merge front and back scans into order." data-ko="앞면·뒷면을 따로 스캔한 두 PDF를 한 장씩 번갈아 합칩니다.">Merge front and back scans into order.</p>
<p id="status">Loading tool…</p>

<label for="frontDrop" data-i18n data-en="Front scan" data-ko="앞면 스캔">Front scan</label>
<div class="drop" id="frontDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" id="frontInput" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<label for="backDrop" data-i18n data-en="Back scan" data-ko="뒷면 스캔">Back scan</label>
<div class="drop" id="backDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" id="backInput" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<div class="checkline">
  <input type="checkbox" id="reverseB" checked>
  <label for="reverseB" data-i18n data-en="Back scan is in reverse order" data-ko="뒷면이 역순으로 스캔됨">Back scan is in reverse order</label>
</div>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Interleave" data-ko="교차 병합하기">Interleave</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./interleave.wasm");
const frontDz = dropzone("frontDrop", { multiple: false });
const backDz = dropzone("backDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const reverseB = document.getElementById("reverseB");

btn.addEventListener("click", () => run(btn, async () => {
  if (frontDz.files.length < 1 || backDz.files.length < 1) {
    showErr(err, t("Select both the front and back files.", "앞면과 뒷면 파일을 모두 선택하세요."));
    return;
  }
  const a = await fileBytes(frontDz.files[0]);
  const b = await fileBytes(backDz.files[0]);
  const r = pdfRun(a, b, reverseB.checked);
  finish(r, "interleaved.pdf", err);
}));
</script>
</body>
</html>
