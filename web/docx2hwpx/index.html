<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Word → Hangul — Paper Tools</title>
<link rel="stylesheet" href="../style.css">
<link rel="preload" href="./docx2hwpx.wasm" as="fetch" crossorigin>
</head>
<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Word → Hangul" data-ko="Word(.docx) → 한글(.hwpx)">Word → Hangul</h1>
<p class="desc" data-i18n data-en="Convert .docx to .hwpx. Only text and paragraphs are carried over." data-ko="Word 문서를 한글 hwpx로 바꿉니다. 글과 문단만 옮겨지고 서식·표는 유지되지 않습니다.">Convert .docx to .hwpx. Only text and paragraphs are carried over.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drop a file here, or click to choose" data-ko="파일을 끌어다 놓거나 클릭해서 선택">Drop a file here, or click to choose</span>
  <input type="file" accept=".docx">
  <ul class="filelist"></ul>
</div>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Convert" data-ko="변환하기">Convert</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./docx2hwpx.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select a file.", "파일을 선택하세요."));
    return;
  }
  const bytes = await fileBytes(fileDz.files[0]);
  const r = pdfRun(bytes);
  finish(r, "converted.hwpx", err, "application/hwp+zip");
}));
</script>
</body>
</html>
