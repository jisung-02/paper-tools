<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Protect — Paper Tools</title>
<link rel="stylesheet" href="../style.css">
<link rel="preload" href="./protect.wasm" as="fetch" crossorigin>
</head>
<body>

<header>
  <a class="wordmark" href="../" data-i18n data-en="Paper Tools" data-ko="종이도구">Paper Tools</a>
  <nav class="langtoggle">
    <button type="button" data-lang="en">EN</button><span aria-hidden="true">/</span><button type="button" data-lang="ko">한국어</button>
  </nav>
</header>

<main>
<a class="back" href="../" data-i18n data-en="← All tools" data-ko="← 모든 도구">← All tools</a>

<h1 data-i18n data-en="Protect" data-ko="암호 설정">Protect</h1>
<p class="desc" data-i18n data-en="Encrypt the PDF with an AES-128 password." data-ko="PDF를 열 때 암호를 묻도록 설정합니다.">Encrypt the PDF with an AES-128 password.</p>
<p id="status">Loading tool…</p>

<div class="drop" id="fileDrop">
  <span data-i18n data-en="Drag a PDF here, or click to choose" data-ko="PDF를 끌어다 놓거나 클릭해서 선택">Drag a PDF here, or click to choose</span>
  <input type="file" accept="application/pdf">
  <ul class="filelist"></ul>
</div>

<label for="userPw" data-i18n data-en="User password" data-ko="사용자 암호">User password</label>
<input type="password" id="userPw">

<label for="ownerPw" data-i18n data-en="Owner password" data-ko="소유자 암호">Owner password</label>
<input type="password" id="ownerPw" data-en-placeholder="Leave blank to match the user password" data-ko-placeholder="비우면 사용자 암호와 동일" placeholder="Leave blank to match the user password">
<p class="hint" data-i18n data-en="AES-128 · Latin letters/numbers only" data-ko="AES-128 · 영문/숫자 암호만">AES-128 · Latin letters/numbers only</p>

<button class="primary" id="run" data-needs-wasm disabled data-i18n data-en="Set Password" data-ko="암호 걸기">Set Password</button>
<p class="err" id="err"></p>
</main>

<footer data-i18n data-en="No server · no uploads · everything runs in this tab" data-ko="서버 없음 · 업로드 없음 · 모든 처리는 이 탭 안에서 끝납니다">No server · no uploads · everything runs in this tab</footer>

<script src="../wasm_exec.js"></script>
<script src="../app.js"></script>
<script>
boot("./protect.wasm");
const fileDz = dropzone("fileDrop", { multiple: false });
const btn = document.getElementById("run");
const err = document.getElementById("err");
const userPw = document.getElementById("userPw");
const ownerPw = document.getElementById("ownerPw");

btn.addEventListener("click", () => run(btn, async () => {
  if (fileDz.files.length < 1) {
    showErr(err, t("Select a file.", "파일을 선택하세요."));
    return;
  }
  if (!userPw.value && !ownerPw.value) {
    showErr(err, t("Enter a password.", "암호를 입력하세요."));
    return;
  }
  const file = await fileBytes(fileDz.files[0]);
  const r = pdfRun(file, userPw.value, ownerPw.value);
  finish(r, "protected.pdf", err);
}));
</script>
</body>
</html>
